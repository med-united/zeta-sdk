name: Release

on:
  push:
    tags:
      - 'release-*.*.*'
      - 'release-*.*.*-*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#release-}" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Packages
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
          MAVEN_REPOSITORY_URL: https://maven.pkg.github.com/med-united/zeta-sdk
          MAVEN_REPOSITORY_USERNAME: ${{ vars.MAVEN_REPOSITORY_USERNAME }}
          MAVEN_REPOSITORY_PASSWORD: ${{ secrets.MAVEN_REPOSITORY_PASSWORD }}
        run: |
          ./gradlew publishAllPublicationsToGithubPackagesRepository \
            --configure-on-demand \
            -Pde.gematik.zeta.sdk.build-logic.enableAndroid=false \
            -Pde.gematik.zeta.sdk.build-logic.enableIOS=false \
            -Pde.gematik.zeta.sdk.build-logic.enableMacOS=false \
            -Pde.gematik.zeta.sdk.build-logic.enableLinux=false \
            -Pde.gematik.zeta.sdk.build-logic.enableWindows=false
